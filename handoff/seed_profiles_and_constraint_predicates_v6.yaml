schema_version: 0
project:
  name: ettlex

ettles:
  - id: ettle:profiles
    title: Profiles — Governance Dial (Abstract Parent)
    eps:
      - id: ep:profiles:0
        ordinal: 0
        normative: true
        why: |-
          Profiles are the “governance dial” for EttleX: they parameterise how ambiguity, approval routing,
          and safety/guardrail constraints are handled without forking core algorithms.

          Phase 1 requires profile handling to be real (not merely a string carried into manifests), because:
            - the Minimal Constraint Predicate Evaluator MUST be able to route ambiguity via profile rules, and
            - snapshot commit MUST be policy/profile-governed and fail fast unless explicitly routed under profile.

          In the refinement model, this node is an abstract parent and exists to anchor implementable leaf children
          that provide:
            - profile persistence + resolution + versioning (Profiles Core)
            - profile-governed constraint predicate evaluation (Constraint Predicates)
            - profile authoring commands + approval routing primitives (Profiles Actions)

          This Ettle also exists to keep the semantics *inside the engine* rather than in the MCP or CLI transports.
          MCP/CLI MUST remain thin adapters over the same engine Commands/Queries.

        what: |-
          This Ettle is intentionally NON-LEAF and therefore NON-IMPLEMENTABLE directly.

          Contract (MUST be satisfied by child implementations):

          1) Canonical profile identity and immutability
             - A Profile is addressable by a stable profile_ref string of the form:
                 profile/<profile_id>@<version>
             - profile_id MUST be a non-empty identifier with a restricted character set to avoid ambiguity and
               path injection (implementation-defined, but MUST be deterministic and documented).
             - version MUST be a non-negative integer in Phase 1.
             - Each profile version MUST be immutable once created. Any update MUST create a new version.

          2) Deterministic profile resolution
             - Any API accepting profile_ref MUST resolve to a stored profile version deterministically.
             - If profile_ref is omitted, resolution MUST follow a deterministic defaulting rule.

          3) Minimal governance knobs (normative semantics)
             - Profiles MUST provide, at minimum:
                 ambiguity_policy: fail_fast | route_for_approval | choose_deterministic
                 approval_routing: { required: bool, channel: string }
                 determinism_mode: strict | permissive
             - If ambiguity_policy=route_for_approval then approval_routing.required MUST be true.

          4) Consumers accept resolved Profile objects
             - Downstream components (predicate evaluator, snapshot commit policy, etc.) MUST accept a resolved
               Profile object (structured) and MUST NOT treat profile_ref as an opaque string.
             - Resolved Profile objects MUST contain:
                 * profile_ref
                 * profile_digest
                 * parsed payload (minimal knobs at least)
                 * optional metadata (created_at, source) if available

          5) route_for_approval produces durable, queryable approval requests
             - When profile requires route_for_approval, the system MUST create a durable approval request object
               and return an approval_token.
             - Approval requests MUST be queryable through read surfaces (queries) for later workflow integration.
             - Approval requests MUST include stable comparison data (semantic_request_digest) so workflows can deduplicate.

          6) CAS + SQLite discipline
             - Canonical payload bytes for Profiles and Approval Requests MUST be stored in CAS and referenced by digest.
             - SQLite provides indexes and lookups; missing indexes MUST NOT prevent correctness if CAS is present
               (non-load-bearing principle), but MUST be populated when healthy.
             - CAS layout MUST follow: cas/<shard>/<digest>.json, with atomic temp->rename writes.

          7) Determinism commitments
             - For the same semantic input, the same canonical bytes MUST be produced (except where explicitly allowed,
               e.g., created_at included in request_digest but excluded from semantic_request_digest).
             - Any determinism instability MUST raise DeterminismViolation in strict mode.

        how: |-
          No executable scenarios live here because this is a contract node. All executable scenarios live in leaf children.

      - id: ep:profiles:1
        ordinal: 1
        normative: true
        why: |-
          Phase 1 requires constraints to become meaningful. Even with an experimental DSL, Phase 1 must include:
            - deterministic evaluation of simple predicates over metadata context
            - candidate selection for ABB→SBB trees where metadata is decisive
            - ambiguity detection and approval routing via profile

          This EP anchors the implementable predicate evaluator leaf and binds it into the Profiles subtree.

        what: |-
          The child leaf MUST implement:
            - deterministic predicate parsing/evaluation over typed metadata context
            - deterministic candidate selection
            - ambiguity handling governed by the resolved Profile (fail_fast / route_for_approval / choose_deterministic)
            - durable approval request creation when route_for_approval is selected
            - outputs suitable for inclusion into manifest.constraint_resolution
            - test harnesses sufficient to detect determinism violations in ordering / traversal

        how: |-
          Executable scenarios live in the leaf child.

      - id: ep:profiles:2
        ordinal: 2
        normative: true
        why: |-
          The MCP thin slice is intended to remove the seed-import bootstrap path over time. For that to be viable:
            - profiles MUST be creatable/configurable through the engine command surface
            - route_for_approval MUST be operationally usable (durable approval request + queryability)

          These responsibilities MUST live inside the Profiles subtree so they remain engine semantics and do not leak into
          transport wrappers (CLI/MCP).

        what: |-
          The child leaf MUST implement:
            - Commands for profile creation/versioning and deterministic default profile selection
            - Approval routing primitives (a router interface + default durable persistence)
            - Queries to read approval requests and profiles, supporting later workflow integration
            - clear transactional invariants: no partial SQLite state, CAS may lead but is non-load-bearing

        how: |-
          Executable scenarios live in the leaf child.

  - id: ettle:profiles_core
    title: Profiles — Persistence, Versioning, and Resolution (Leaf)
    eps:
      - id: ep:profiles_core:0
        ordinal: 0
        normative: true
        why: |-
          Profiles must be first-class canonical objects, not just strings. Phase 1 needs deterministic profile resolution
          so downstream components can be governed consistently.

          This leaf establishes:
            - canonical profile identity and parsing
            - storage in CAS with SQLite indexing
            - deterministic defaulting
            - typed error taxonomy for profile handling
            - read query surface required by CLI/MCP and internal consumers
            - normative validation of minimal profile payload schema

        what: |-
          Implement minimal, canonical profile persistence and resolution.

          1) profile_ref format and parsing (normative)
             - profile_ref MUST be: "profile/<profile_id>@<version_int>"
             - profile_id MUST:
                 * be non-empty
                 * MUST NOT contain '/' or '@'
                 * MUST be trimmed (no leading/trailing whitespace)
             - version_int MUST:
                 * parse as base-10 integer
                 * be >= 0
             - Parsing MUST be deterministic and MUST fail with typed error ProfileRefInvalid.

          2) Profile payload canonicalisation (normative)
             - Profile payload is JSON.
             - Canonicalisation MUST be deterministic:
                 * stable key ordering (including nested maps)
                 * stable numeric representation (implementation-defined; MUST be documented)
                 * no insignificant whitespace
                 * string encoding is UTF-8
             - Canonical bytes MUST be used for digest computation and stored in CAS.
             - Any canonicalisation failure MUST return ProfileInvalid OR DeterminismViolation (as applicable).

          3) CAS storage (normative)
             - The profile payload canonical bytes MUST be written to CAS:
                 path: cas/<shard>/<digest>.json
                 kind: profile_json
             - CAS writes MUST be atomic (temp → rename; fsync strategy implementation-defined).
             - profile_digest MUST equal digest(canonical_profile_bytes).

          4) SQLite indexing (normative)
             - SQLite MUST provide lookup by:
                 * (profile_id, version_int) -> profile_digest
                 * profile_ref -> profile_digest
             - The schema MAY be:
                 * a dedicated profiles table, OR
                 * a generic objects table keyed by kind+ref.
               Whatever is chosen MUST satisfy uniqueness invariants and support deterministic resolution.
             - The index MUST enforce uniqueness of (profile_id, version_int).
             - cas_blobs upsert SHOULD occur when healthy (non-load-bearing for correctness).
             - If index rows are corrupt (duplicate keys, missing digest), resolution MUST fail with typed errors.

          5) Deterministic defaulting (normative)
             Resolution of a missing profile_ref MUST follow:
               a) if repo config default_profile_ref is set: resolve that profile_ref
               b) else if profile/default@0 exists: resolve that
               c) else: fail with ProfileDefaultMissing

          6) Immutability and version discipline (normative)
             - Creating an already-existing profile_ref with identical canonical bytes MUST be idempotent success.
             - Creating an already-existing profile_ref with different canonical bytes MUST fail with ProfileConflict.
             - Updating a profile version in-place MUST NOT be supported; attempts MUST fail with ProfileImmutable.

          7) Typed error taxonomy (normative)
             - ProfileRefInvalid
             - ProfileNotFound
             - ProfileDefaultMissing
             - ProfileConflict
             - ProfileImmutable
             - ProfileCorrupt (duplicate key / broken invariant)
             - ProfileStorageCorrupt (CAS missing or unreadable payload)
             - CasMissing (used internally; may be wrapped as ProfileStorageCorrupt)
             - DeterminismViolation (if canonicalisation or ordering is unstable)
             - ProfileInvalid (payload schema/invariants)

          8) Query surface (normative)
             - Query::ProfileGet(profile_ref) -> ProfileRecord{profile_ref, digest, payload, metadata}
             - Query::ProfileList(filter?, paging?) -> stable ordered list
             - Query::ProfileResolve(profile_ref?) -> ResolvedProfile{profile_ref, digest, parsed payload}
             - Query::ProfileGetDefault() -> profile_ref (and optionally resolved profile)

          9) Minimal profile payload schema and invariants (normative)
             Required keys:
               - ambiguity_policy: fail_fast | route_for_approval | choose_deterministic
               - approval_routing:
                   required: bool
                   channel: string
               - determinism_mode: strict | permissive

             Invariants:
               - ambiguity_policy MUST be one of the allowed enum values
               - determinism_mode MUST be one of the allowed enum values
               - approval_routing.required MUST be boolean
               - approval_routing.channel MUST be string (may be empty but MUST be present)
               - If ambiguity_policy=route_for_approval:
                   * approval_routing.required MUST be true
               - If ambiguity_policy!=route_for_approval:
                   * approval_routing.required MAY be false or true (implementation-defined), but MUST NOT break semantics

          Out of scope:
             - policy objects (separate)
             - approval requests (Profiles Actions leaf)
             - cross-repo distribution
             - profile inheritance / merging

        how: |-
          Scenarios (all MUST be implemented as tests; Gherkin is normative):

          Feature: Profile persistence and deterministic resolution

            Background:
              Given a repository with SQLite + CAS initialised
              And migrations include profile indexing structures
              And CAS is healthy

            # --- Parsing / validation ---

            Scenario: Parse valid profile_ref deterministically
              When I parse profile_ref "profile/default@0"
              Then profile_id is "default"
              And version_int is 0

            Scenario: Reject missing version
              When I parse profile_ref "profile/default"
              Then parsing fails with ProfileRefInvalid

            Scenario: Reject empty profile_id
              When I parse profile_ref "profile/@0"
              Then parsing fails with ProfileRefInvalid

            Scenario: Reject negative version
              When I parse profile_ref "profile/default@-1"
              Then parsing fails with ProfileRefInvalid

            Scenario: Reject disallowed characters in profile_id
              When I parse profile_ref "profile/a/b@0"
              Then parsing fails with ProfileRefInvalid
              When I parse profile_ref "profile/a@b@0"
              Then parsing fails with ProfileRefInvalid

            Scenario: Reject whitespace around identifiers
              When I parse profile_ref "profile/ default@0"
              Then parsing fails with ProfileRefInvalid
              When I parse profile_ref "profile/default @0"
              Then parsing fails with ProfileRefInvalid

            Scenario: Reject non-decimal version
              When I parse profile_ref "profile/default@0x10"
              Then parsing fails with ProfileRefInvalid

            # --- Canonicalisation and digest stability ---

            Scenario: Canonicalisation yields stable digest across key order differences
              Given payload P1 is {"ambiguity_policy":"fail_fast","approval_routing":{"required":false,"channel":"x"},"determinism_mode":"strict"}
              And payload P2 is {"determinism_mode":"strict","approval_routing":{"channel":"x","required":false},"ambiguity_policy":"fail_fast"}
              When I create profile "profile/alpha@0" from P1 in store S1
              And I create profile "profile/alpha@0" from P2 in store S2
              Then profile_digest in S1 equals profile_digest in S2

            Scenario: Canonical bytes written to CAS match digest
              When I create profile "profile/default@0" with payload P
              Then CAS contains blob kind profile_json with digest D
              And reading CAS bytes and hashing yields digest D

            Scenario: Canonicalisation stable across nested key order differences
              Given payload P1 and P2 differ only by nested approval_routing key order
              When I create profile "profile/nested@0" in fresh stores
              Then digests are identical

            Scenario: Canonicalisation rejects non-object payload
              Given payload is a JSON array
              When I create profile "profile/badjson@0"
              Then it fails with ProfileInvalid

            # --- Minimal payload schema invariants ---

            Scenario: Missing ambiguity_policy is rejected
              Given payload missing ambiguity_policy
              When I create profile "profile/bad@0"
              Then it fails with ProfileInvalid

            Scenario: Missing determinism_mode is rejected
              Given payload missing determinism_mode
              When I create profile "profile/bad@1"
              Then it fails with ProfileInvalid

            Scenario: Missing approval_routing is rejected
              Given payload missing approval_routing
              When I create profile "profile/bad@2"
              Then it fails with ProfileInvalid

            Scenario: Missing approval_routing.required is rejected
              Given payload approval_routing missing required
              When I create profile "profile/bad@6"
              Then it fails with ProfileInvalid

            Scenario: Missing approval_routing.channel is rejected
              Given payload approval_routing missing channel
              When I create profile "profile/bad@7"
              Then it fails with ProfileInvalid

            Scenario: route_for_approval requires approval_routing.required=true
              Given payload ambiguity_policy "route_for_approval"
              And approval_routing.required is false
              When I create profile "profile/bad@3"
              Then it fails with ProfileInvalid

            Scenario: Unknown enum values rejected deterministically
              Given payload ambiguity_policy "maybe"
              When I create profile "profile/bad@4"
              Then it fails with ProfileInvalid
              Given payload determinism_mode "super_strict"
              When I create profile "profile/bad@5"
              Then it fails with ProfileInvalid

            Scenario: Wrong types rejected deterministically
              Given payload approval_routing.required is "true" (string)
              When I create profile "profile/badtypes@0"
              Then it fails with ProfileInvalid
              Given payload approval_routing.channel is 123 (number)
              When I create profile "profile/badtypes@1"
              Then it fails with ProfileInvalid

            # --- Uniqueness, immutability, idempotency ---

            Scenario: Create and resolve a new profile version
              Given no profile "profile/default@0" exists
              When I create profile "profile/default@0" with payload P
              Then Query::ProfileGet("profile/default@0") succeeds
              And it returns digest D and payload P (canonical form)

            Scenario: Creating the same profile_ref with identical payload is idempotent
              Given profile "profile/default@0" exists with canonical payload bytes B and digest D
              When I create profile "profile/default@0" again with a JSON payload that canonicalises to B
              Then the operation succeeds
              And Query::ProfileGet("profile/default@0") still returns digest D

            Scenario: Creating the same profile_ref with different payload conflicts
              Given profile "profile/default@0" exists with payload P
              When I create profile "profile/default@0" with payload P2 where canonical(P2) != canonical(P)
              Then it fails with ProfileConflict
              And the stored digest remains for payload P

            Scenario: Attempting in-place update is rejected
              Given profile "profile/default@0" exists
              When I call an update API targeting "profile/default@0"
              Then it fails with ProfileImmutable

            Scenario: Creating a new version succeeds and both versions resolve correctly
              Given profile "profile/default@0" exists
              When I create profile "profile/default@1" with payload P2
              Then Query::ProfileGet("profile/default@0") returns version 0 payload
              And Query::ProfileGet("profile/default@1") returns version 1 payload

            # --- Defaulting rules ---

            Scenario: Resolve omitted profile_ref uses config default deterministically
              Given repo config default_profile_ref is set to "profile/default@0"
              And profile "profile/default@0" exists
              When I call Query::ProfileResolve(null)
              Then it resolves to "profile/default@0"

            Scenario: Resolve omitted profile_ref uses well-known default when config not set
              Given repo config default_profile_ref is not set
              And profile "profile/default@0" exists
              When I call Query::ProfileResolve(null)
              Then it resolves to "profile/default@0"

            Scenario: Resolve omitted profile_ref fails when no deterministic default exists
              Given repo config default_profile_ref is not set
              And profile "profile/default@0" does not exist
              When I call Query::ProfileResolve(null)
              Then it fails with ProfileDefaultMissing

            Scenario: Config default points to missing profile -> ProfileDefaultMissing
              Given repo config default_profile_ref is "profile/missing@0"
              When I call Query::ProfileResolve(null)
              Then it fails with ProfileDefaultMissing

            # --- Storage corruption / non-load-bearing index ---

            Scenario: CAS missing profile payload is detected
              Given a profile row exists referencing digest D
              And CAS does not contain digest D
              When I call Query::ProfileGet(profile_ref for D)
              Then it fails with ProfileStorageCorrupt
              And the error indicates CasMissing

            Scenario: cas_blobs is non-load-bearing for profile reads
              Given a profile exists and CAS contains the profile payload
              And cas_blobs row for the digest is missing
              When I call Query::ProfileGet(profile_ref)
              Then it succeeds

            Scenario: Missing SQLite index row is detected as ProfileCorrupt (unless repaired)
              Given CAS contains digest D for a profile
              And SQLite profile index row is missing for that profile_ref
              When I call Query::ProfileGet(profile_ref)
              Then it fails with ProfileNotFound (or ProfileCorrupt if the system distinguishes)
              And no implicit repair occurs unless explicitly implemented

            Scenario: Duplicate index rows are detected as corruption
              Given two index rows exist for the same (profile_id, version) due to corruption
              When I resolve that profile_ref
              Then it fails with ProfileCorrupt

            # --- Concurrency / transaction boundaries ---

            Scenario: Concurrent create of same profile_ref with identical payload results in one row
              Given two workers attempt Command::ProfileCreate("profile/race@0", payload P) concurrently
              When both operations complete
              Then exactly one profile row exists for ("race",0)
              And both workers observe success (one may observe already-exists idempotent success)

            Scenario: Concurrent create of same profile_ref with different payload results in conflict
              Given two workers attempt Command::ProfileCreate("profile/race@0", payload P1) and payload P2 concurrently
              And canonical(P1) != canonical(P2)
              When both operations complete
              Then exactly one profile row exists for ("race",0)
              And one worker observes success
              And the other observes ProfileConflict

            Scenario: Transaction boundary ensures no partial SQLite state on failure
              Given a simulated SQLite failure occurs during profile insert
              When I run Command::ProfileCreate("profile/fail@0", payload P)
              Then the command fails
              And there is no profile index row for ("fail",0)
              And the CAS blob may exist but is unreferenced until GC

  - id: ettle:profiles_actions
    title: Profiles Actions + Approval Routing Primitives (Leaf)
    eps:
      - id: ep:profiles_actions:0
        ordinal: 0
        normative: true
        why: |-
          To remove the seed-import bootstrap path, profiles must be creatable and configurable through the engine command
          surface (and therefore via CLI/MCP as thin transports).

          Additionally, route_for_approval requires a durable approval request artefact that can be surfaced to workflow
          systems later. Phase 1 will implement route_for_approval now and defer the “approval execution” (approve/deny)
          workflow until later.

          This leaf therefore owns:
            - Commands for profile creation/versioning and default selection (authoring path)
            - Approval router interface + default durable persistence for approval requests
            - Queries to read approval requests (so route_for_approval is operationally usable)

        what: |-
          Deliverables (normative):

          A) Profile authoring commands
             1) Command::ProfileCreate(profile_ref, payload_json, source?)
                MUST:
                  - parse and validate profile_ref
                  - validate payload schema and invariants
                  - canonicalise payload deterministically
                  - write canonical payload bytes to CAS (kind profile_json) atomically
                  - compute profile_digest from canonical bytes
                  - insert/ensure profile index row in SQLite (unique on profile_id+version)
                  - append provenance event:
                      event_type: profile_created
                      profile_ref, profile_digest, timestamp, source (if provided)
                MUST be transactional in the sense that SQLite updates and provenance append are within a single
                transaction boundary. CAS write may occur before transaction commit, but correctness MUST not depend on
                the SQLite index (non-load-bearing principle).

                Idempotency and conflicts:
                  - if profile_ref exists with same profile_digest: return success (idempotent)
                  - if profile_ref exists with different profile_digest: return ProfileConflict
                  - MUST NOT silently overwrite existing versions

             2) Command::ProfileSetDefault(profile_ref)
                MUST:
                  - resolve profile_ref (must exist) else ProfileNotFound
                  - set deterministic default_profile_ref in repo config storage
                  - append provenance event:
                      event_type: profile_default_set
                      profile_ref, timestamp
                Storage for default_profile_ref MUST be one of:
                  - repo config file (atomic update), OR
                  - SQLite config table (preferred for transactional semantics).
                The chosen mechanism MUST be deterministic and testable.

             3) Optional Command::ProfileCreateNextVersion(profile_id, payload_json, source?)
                Out of scope for Phase 1 unless scenarios below are implemented.
                If implemented:
                  - MUST allocate version_int atomically (no collisions)
                  - MUST be consistent with profile_ref parsing/formatting
                If NOT implemented, clients MUST supply explicit profile_ref.

          B) Approval routing primitives (route_for_approval support)
             1) Service interface: ApprovalRouter
                - route_approval_request(request: ApprovalRequest) -> approval_token
                - get_approval_request(approval_token) -> ApprovalRequest
                The interface MUST be usable by:
                  - constraint predicate evaluator when ambiguity_policy=route_for_approval
                  - snapshot commit policy when routing is required as part of commit gating
                The interface MUST be synchronous in Phase 1 (no background jobs).

             2) Default durable persistence implementation MUST:
                - canonicalise ApprovalRequest payload deterministically
                - write canonical payload bytes to CAS (kind approval_request_json) atomically
                - compute request_digest from canonical bytes
                - include created_at in canonical bytes for request_digest
                - compute semantic_request_digest excluding created_at
                - generate approval_token deterministically from request_digest OR store a generated token in the payload;
                  whichever is chosen MUST be stable and documented
                - index approval requests in SQLite for lookup by approval_token

          C) Minimal ApprovalRequest schema (normative)
             The ApprovalRequest payload MUST be JSON and MUST include:

               approval_token: string
               created_at: timestamp (RFC3339 or equivalent; format MUST be documented)
               kind: enum (constraint_ambiguity | snapshot_commit | other)
               status: enum (pending | approved | denied)  # Phase 1 will only produce pending
               profile_ref: string
               policy_ref: string (may be empty)
               leaf_ep_id: string (may be empty)
               reason_code: string (e.g., AmbiguousSelection)
               candidate_set: array[string] (may be empty)
               context_digest: string (optional; may be empty)
               semantic_request_digest: string  # digest over canonical request with created_at excluded

             Canonicalisation and digests:
               - request_digest = digest(canonical_request_bytes INCLUDING created_at)
               - semantic_request_digest MUST be computed excluding created_at, so identical requests across runs have a
                 stable comparison key.
               - approval_token MUST equal request_digest (binding). request_digest MUST be computed over the canonical approval request payload bytes (including created_at); the token MUST be stable and derivable from CAS alone.

             Invariants:
               - status MUST be "pending" when created by route_for_approval in Phase 1
               - candidate_set MUST be stable ordered (lexicographic) within the request payload canonicalisation
               - profile_ref MUST parse successfully as a profile_ref (use Profiles Core parser)
               - policy_ref MAY be empty; if not empty, MUST satisfy policy_ref validation rules (if any)
               - leaf_ep_id MAY be empty; if not empty, MUST reference an existing EP when validated (validation may be deferred)

          D) Minimal SQLite indexing for approval requests (normative)
             Preferred: approval_requests table (introduced via migration now)
               - approval_token TEXT PRIMARY KEY
               - request_digest TEXT NOT NULL
               - kind TEXT NOT NULL
               - status TEXT NOT NULL
               - created_at TEXT NOT NULL
               - profile_ref TEXT NOT NULL
               - policy_ref TEXT NOT NULL
               - leaf_ep_id TEXT NOT NULL
               - reason_code TEXT NOT NULL

             Indexing requirements:
               - approval_token uniqueness enforced by PRIMARY KEY
               - approval_token lookup MUST be O(log n) or better (SQLite index)
               - request_digest MUST reference an existing CAS blob when healthy
               - missing cas_blobs row MUST NOT prevent retrieval if CAS is present

          E) Query surface (normative)
             - Query::ApprovalGet(approval_token) -> ApprovalRequestRecord{token, request_digest, payload, semantic_request_digest}
             - Query::ApprovalList(filter?, paging?) -> stable ordered list
                 * order MUST be deterministic (e.g., created_at ascending then token lexicographic)
                 * paging MUST be deterministic if implemented
             - Profiles Actions MUST NOT duplicate Query::ProfileGetDefault; it MUST reuse Profiles Core.

          Typed errors for approval routing (normative):
             - ApprovalRequestInvalid
             - ApprovalNotFound
             - ApprovalStorageCorrupt (including CasMissing)
             - ApprovalConflict (if duplicate token with different digest arises)
             - ApprovalRoutingUnavailable (router not configured)
             - DeterminismViolation (unstable canonicalisation / ordering)

          Out of scope:
             - approval execution (approve/deny and resume operations)
             - external channel integrations (email/ticketing) beyond hook points

        how: |-
          Scenarios (tests; Gherkin is normative):

          Feature: Profile authoring commands (seed import removal path)

            Background:
              Given Profiles Core exists and profile persistence is available
              And CAS is healthy
              And SQLite is healthy

            Scenario: ProfileCreate writes CAS and inserts profile index row
              When I run Command::ProfileCreate("profile/default@0", payload P)
              Then CAS contains a profile_json blob with digest D
              And SQLite contains a profile index row for ("default",0) referencing digest D
              And a provenance event of type profile_created exists
              And Query::ProfileGet("profile/default@0") returns digest D

            Scenario: ProfileCreate is idempotent on identical payload
              Given "profile/default@0" exists with canonical digest D
              When I run Command::ProfileCreate("profile/default@0", payload P) again where canonical(P) hashes to D
              Then it succeeds
              And there is still exactly one profile index row for ("default",0)
              And Query::ProfileGet("profile/default@0") returns digest D

            Scenario: ProfileCreate conflicts on different payload
              Given "profile/default@0" exists with canonical digest D1
              When I run Command::ProfileCreate("profile/default@0", payload P2) where canonical(P2) hashes to D2 and D2 != D1
              Then it fails with ProfileConflict
              And Query::ProfileGet("profile/default@0") still returns digest D1

            Scenario: ProfileCreate rejects invalid profile_ref
              When I run Command::ProfileCreate("profile/@0", payload P)
              Then it fails with ProfileRefInvalid
              And no SQLite row is inserted

            Scenario: ProfileCreate rejects invalid payload schema
              Given payload missing required keys
              When I run Command::ProfileCreate("profile/bad@0", that payload)
              Then it fails with ProfileInvalid
              And no SQLite row is inserted

            Scenario: ProfileCreate is atomic with respect to SQLite index row
              Given a crash occurs after CAS write but before SQLite insert commits
              When I restart and query for "profile/crash@0"
              Then Query::ProfileGet("profile/crash@0") fails with ProfileNotFound (no partial index)
              And the CAS blob may exist but is unreferenced until GC

            Scenario: ProfileSetDefault fails if profile does not exist
              Given "profile/default@0" does not exist
              When I run Command::ProfileSetDefault("profile/default@0")
              Then it fails with ProfileNotFound

            Scenario: ProfileSetDefault sets deterministic default
              Given profile "profile/default@0" exists
              When I run Command::ProfileSetDefault("profile/default@0")
              Then Query::ProfileGetDefault returns "profile/default@0"
              And a provenance event of type profile_default_set exists

            Scenario: ProfileSetDefault is atomic
              Given profile "profile/default@0" exists
              And a crash is simulated during default set
              When I restart and read default_profile_ref
              Then default_profile_ref is either unchanged OR fully updated to "profile/default@0" (no partial state)

            Scenario: Concurrent ProfileSetDefault results in one deterministic final value
              Given profiles "profile/a@0" and "profile/b@0" both exist
              When two workers call ProfileSetDefault concurrently with those refs
              Then the repository ends with exactly one default_profile_ref value
              And the value equals either "profile/a@0" or "profile/b@0"
              And the state is consistent (no partial writes)
              And provenance events record both attempts in order (if ordering can be defined) or at least both exist

          Feature: Approval routing primitives (durable approval requests)

            Background:
              Given an ApprovalRouter is configured to use default durable persistence
              And CAS is healthy
              And SQLite approval_requests indexing exists

            Scenario: route_approval_request persists request and returns token
              Given an ApprovalRequest R with kind constraint_ambiguity
              And candidate_set ["A","B"]
              And profile_ref "profile/default@0"
              And status "pending"
              When I call ApprovalRouter.route_approval_request(R)
              Then an approval_token T is returned
              And SQLite approval_requests has a row keyed by T
              And CAS contains an approval_request_json blob for request_digest referenced by that row
              And Query::ApprovalGet(T) returns a payload matching R (with created_at as recorded)

            Scenario: candidate_set is stored deterministically in the request payload
              Given candidate_set ["B","A"] in the input request
              When I route the request
              Then Query::ApprovalGet(token).candidate_set equals ["A","B"]

            Scenario: semantic_request_digest is stable across runs
              Given an ApprovalRequest template R0 with the same fields except created_at
              When I route R0 twice with different created_at timestamps
              Then request_digest may differ
              And semantic_request_digest is identical

            Scenario: ApprovalGet fails for unknown token
              When I call Query::ApprovalGet("approval:missing")
              Then it fails with ApprovalNotFound

            Scenario: ApprovalGet fails when SQLite row exists but CAS missing
              Given SQLite has approval_requests row for token T referencing digest D
              And CAS does not contain D
              When I call Query::ApprovalGet(T)
              Then it fails with ApprovalStorageCorrupt
              And the error indicates CasMissing

            Scenario: cas_blobs is non-load-bearing for ApprovalGet
              Given SQLite has approval_requests row for token T referencing digest D
              And CAS contains digest D
              And cas_blobs row for D is missing
              When I call Query::ApprovalGet(T)
              Then it succeeds

            Scenario: Approval request payload rejects invalid enums
              Given kind="unknown_kind"
              When I route the request
              Then it fails with ApprovalRequestInvalid
              And no approval_requests row is created

            Scenario: Approval request rejects invalid profile_ref
              Given request.profile_ref = "profile/@0"
              When I route the request
              Then it fails with ApprovalRequestInvalid
              And no approval_requests row is created

            Scenario: ApprovalRouter never writes partial SQLite state
              Given a failure occurs after CAS write but before SQLite insert
              When I restart and list approval_requests
              Then no approval_requests row exists for that token (or the insert is completed atomically)
              And the CAS blob may exist but is treated as unreferenced garbage until GC

            Scenario: Duplicate approval_token with different digest is rejected
              Given token generation could collide due to a bug
              And an approval_requests row exists for token T referencing digest D1
              When I attempt to persist another request under token T with digest D2 where D2 != D1
              Then it fails with ApprovalConflict
              And the stored row remains referencing D1

            Scenario: ApprovalList ordering is deterministic
              Given three approval requests exist with created_at values t1<t2<t3
              When I call Query::ApprovalList()
              Then the results are ordered by created_at then token lexicographic
              And repeated calls return identical ordering

  - id: ettle:constraint_predicates
    title: Minimal Constraint Predicate Evaluator (Leaf)
    eps:
      - id: ep:constraint_predicates:0
        ordinal: 0
        normative: true
        why: |-
          Snapshot semantics require constraint_resolution to be meaningful. Phase 1 therefore needs a minimal
          constraint predicate evaluator that is deterministic, can select ABB→SBB candidates when metadata is decisive,
          and can detect ambiguity and route approvals according to the active profile.

          This leaf depends on Profiles Core (profile resolution) and Profiles Actions (approval router primitives).

        what: |-
          Implement a minimal, deterministic predicate evaluator over metadata context, with candidate selection and
          ambiguity handling governed by Profiles.

          1) Inputs (Phase 1 minimum)
             - Context: a deterministic key/value map of metadata with typed values:
                 string, number, boolean
               Context canonicalisation MUST be deterministic (stable ordering, stable representation).

             - Candidates: deterministic list of candidate nodes (ABB/SBB identifiers), each with:
                 candidate_id: string (canonicalised)
                 predicate: optional expression string (if absent, always eligible)
                 priority: optional integer (default 100)

             - Predicate DSL (minimal, deterministic)
               MUST support:
                 - equality: key == value
                 - inequality: key != value
                 - membership: key in [v1, v2, ...]
                 - boolean ops: and, or, not
                 - existence: has(key)
               Parsing MUST be deterministic and MUST reject ambiguous syntax.
               The parser MUST NOT accept locale-dependent numeric formats.

          2) Evaluation semantics (normative)
             - If a referenced key is missing and not guarded by has(key), evaluation MUST fail with ContextKeyMissing.
             - Type mismatches MUST fail with PredicateTypeError.
             - The evaluator MUST be side-effect free.

          3) Candidate selection algorithm (normative)
             a) Filter eligible candidates where predicate evaluates to true.
             b) If zero eligible: NoMatch.
             c) If one eligible: Selected(candidate).
             d) If multiple eligible:
                  - select candidates with minimal priority
                  - Priority convention (binding): lower integer value indicates higher precedence.
                  - if exactly one remains: Selected
                  - else: Ambiguous(candidate_set)

          4) Ambiguity handling via resolved Profile (normative)
             - fail_fast:
                 return typed error AmbiguousSelection with candidate_set
             - route_for_approval:
                 MUST call ApprovalRouter.route_approval_request with kind=constraint_ambiguity and record:
                   profile_ref, reason_code=AmbiguousSelection, candidate_set
                 return RoutedForApproval{approval_token, candidate_set}
             - choose_deterministic:
                 apply deterministic tiebreak: lexicographic order on candidate_id and choose smallest

             - If route_for_approval is selected but router is unavailable, return ApprovalRoutingUnavailable.
             - If profile.ambiguity_policy is unknown, return DeterminismViolation OR PredicateParseError (implementation-defined) but MUST be typed.

          5) Outputs (normative)
             - ResolutionResult MUST be serializable deterministically for inclusion in manifest.constraint_resolution:
                 status: selected | no_match | ambiguous | routed_for_approval
                 selected_candidate_id (nullable)
                 candidate_set (for ambiguous/routed)
                 approval_token (for routed)
                 explanation (optional, but if present MUST be deterministic)
                 policy_ref/profile_ref echo fields MAY be included but MUST be deterministic if present

          6) Typed errors (normative)
             - PredicateParseError
             - PredicateTypeError
             - ContextKeyMissing
             - AmbiguousSelection
             - ApprovalRoutingUnavailable
             - DeterminismViolation

          Out of scope:
             - full DSL
             - non-metadata constraints
             - approval execution

        how: |-
          Scenarios (all MUST be implemented as tests; Gherkin is normative):
  
              Feature: Deterministic predicate evaluation and candidate selection
  
              Background:
                - Given Profiles Core exists and can resolve profile_ref
                - And Profiles Actions exists and provides ApprovalRouter
                - And a predicate evaluator API exists: evaluate(profile, context, candidates) -> ResolutionResult
  
              # --- Predicate parsing ---
  
              Scenario: Parse equality predicate deterministically
                Given predicate "platform == \"aws\""
                When I parse it
                Then an AST is returned
                And re-serializing the AST yields the same canonical form
  
              Scenario: Reject invalid predicate syntax
                Given predicate "platform =="
                When I parse it
                Then parsing fails with PredicateParseError
  
              Scenario: Reject unknown operators
                Given predicate "platform ~= \"aws\""
                When I parse it
                Then parsing fails with PredicateParseError
  
              Scenario: Reject locale-dependent numeric syntax
                Given predicate "retries == 1,000"
                When I parse it
                Then parsing fails with PredicateParseError
  
              # --- Evaluation semantics ---
  
              Scenario: Evaluate equality against context
                Given context { platform: "aws" }
                And predicate "platform == \"aws\""
                When I evaluate it
                Then result is true
  
              Scenario: Missing context key is an error unless guarded
                Given context { }
                And predicate "platform == \"aws\""
                When I evaluate it
                Then it fails with ContextKeyMissing
                Given predicate "has(platform) and platform == \"aws\""
                When I evaluate it
                Then result is false
  
              Scenario: Type mismatch yields PredicateTypeError
                Given context { retries: 3 }
                And predicate "retries == \"3\""
                When I evaluate it
                Then it fails with PredicateTypeError
  
              Scenario: Membership works deterministically
                Given context { region: "eu-west-1" }
                And predicate "region in [\"eu-west-1\", \"us-east-1\"]"
                When I evaluate it
                Then result is true
  
              Scenario: not operator works
                Given context { env: "prod" }
                And predicate "not (env == \"dev\")"
                When I evaluate it
                Then result is true
  
              # --- Candidate selection ---
  
              Scenario: NoMatch when no candidates eligible
                Given profile ambiguity_policy fail_fast
                And context { env: "prod" }
                And candidates:
                  | id | predicate        | priority |
                  | A  | env == "dev"     | 100      |
                When I evaluate selection
                Then status is no_match
  
              Scenario: Selected when exactly one eligible
                Given profile ambiguity_policy fail_fast
                And context { env: "prod" }
                And candidates:
                  | id | predicate        | priority |
                  | A  | env == "prod"    | 100      |
                  | B  | env == "dev"     | 100      |
                When I evaluate selection
                Then status is selected
                And selected_candidate_id is "A"
  
              Scenario: Priority resolves multiple eligibles
                Given profile ambiguity_policy fail_fast
                And context { env: "prod" }
                And candidates:
                  | id | predicate        | priority |
                  | A  | env == "prod"    | 10       |
                  | B  | env == "prod"    | 20       |
                When I evaluate selection
                Then status is selected
                And selected_candidate_id is "A"
  
              Scenario: Ambiguous when multiple eligibles with same priority (fail_fast)
                Given profile ambiguity_policy fail_fast
                And context { env: "prod" }
                And candidates:
                  | id | predicate        | priority |
                  | A  | env == "prod"    | 10       |
                  | B  | env == "prod"    | 10       |
                When I evaluate selection
                Then it fails with AmbiguousSelection
                And the error includes candidate_set ["A","B"]
  
              Scenario: route_for_approval returns approval token and persists approval request
                Given profile ambiguity_policy route_for_approval
                And profile approval_routing.required true
                And an approval router is configured
                And context { env: "prod" }
                And candidates:
                  | id | predicate        | priority |
                  | A  | env == "prod"    | 10       |
                  | B  | env == "prod"    | 10       |
                When I evaluate selection
                Then status is routed_for_approval
                And approval_token is not null
                And Query::ApprovalGet(approval_token) succeeds
  
              Scenario: route_for_approval fails if router not configured
                Given profile ambiguity_policy route_for_approval
                And profile approval_routing.required true
                And no approval router is configured
                And context { env: "prod" }
                And candidates A and B both eligible with same priority
                When I evaluate selection
                Then it fails with ApprovalRoutingUnavailable
  
              Scenario: choose_deterministic breaks ties lexicographically
                Given profile ambiguity_policy choose_deterministic
                And context { env: "prod" }
                And candidates:
                  | id | predicate        | priority |
                  | B  | env == "prod"    | 10       |
                  | A  | env == "prod"    | 10       |
                When I evaluate selection
                Then status is selected
                And selected_candidate_id is "A"
  
              Scenario: Candidate ordering in input does not affect result
                Given profile ambiguity_policy choose_deterministic
                And context { env: "prod" }
                And candidates list L1 ordered [B, A]
                And candidates list L2 ordered [A, B]
                When I evaluate selection for L1 and L2
                Then selected_candidate_id is identical
  
              Scenario: Empty candidate list yields NoMatch
                Given candidates are empty
                When I evaluate selection
                Then status is no_match
  
              Scenario: Candidate id canonicalisation is deterministic
                Given candidate ids include leading/trailing whitespace
                When I evaluate selection
                Then the implementation either rejects with PredicateParseError/DeterminismViolation OR trims deterministically (documented)
                And behaviour is stable across runs
  
          # --- Snapshot commit integration (predicate evaluation → manifest.constraint_resolution) ---
  
                      Scenario: snapshot_commit calls predicate evaluator and projects computed ResolutionResult into manifest.constraint_resolution
                        Given a profile exists with predicate evaluation enabled
                        And snapshot_commit is executed under that resolved profile
                        When snapshot_commit calls evaluate(profile, context, candidates)
                        And the evaluator returns ResolutionResult with:
                      | status | selected_candidate_id | approval_token | candidate_set |
                      | resolved | profile/P@1 | (absent) | [profile/P@1] |
                    Then snapshot_commit MUST project ResolutionResult into manifest.constraint_resolution
                    And manifest.constraint_resolution.status is "resolved"
                    And manifest.constraint_resolution.selected_profile_ref equals "profile/P@1"
                    And manifest.constraint_resolution.approval_token is absent
                    And manifest.constraint_resolution.candidates contains exactly ["profile/P@1"] in deterministic order
                    And manifest.semantic_manifest_digest includes the projected constraint_resolution content
  
          Scenario: snapshot_commit distinguishes UNCOMPUTED from computed NoMatch in manifest.constraint_resolution
            Given two snapshot_commit executions:
              | case | predicate_evaluation | evaluator_invoked | evaluator_status |
              | A | disabled | no | uncomputed |
              | B | enabled | yes | no_match |
            When each snapshot_commit commits a manifest
            Then case A manifest.constraint_resolution.status is "uncomputed"
            And case A manifest.constraint_resolution.candidates is empty
            And case B manifest.constraint_resolution.status is "no_match"
            And case B manifest.constraint_resolution.candidates is empty
            And the two statuses are not conflated
  
          Scenario: snapshot_commit projects routed_for_approval ResolutionResult including approval_token and candidate_set
            Given a profile exists with predicate evaluation enabled
            And snapshot_commit is executed under that resolved profile
            When snapshot_commit calls evaluate(profile, context, candidates)
            And the evaluator returns ResolutionResult with:
              | status | selected_candidate_id | approval_token | candidate_set |
              | routed_for_approval | (absent) | T | [profile/P1@1, profile/P2@1] |
            Then snapshot_commit MUST project ResolutionResult into manifest.constraint_resolution
            And manifest.constraint_resolution.status is "routed_for_approval"
            And manifest.constraint_resolution.approval_token equals "T"
            And manifest.constraint_resolution.selected_profile_ref is absent
            And manifest.constraint_resolution.candidates contains exactly ["profile/P1@1","profile/P2@1"] in deterministic order
  
          Scenario: snapshot_commit projection is deterministic regardless of created_at
            Given two approval requests are identical in semantic content but differ in created_at
            And the resulting snapshot_commit manifests differ in created_at
            When semantic_manifest_digest is computed
            Then semantic_manifest_digest is identical across both manifests
            And the constraint_resolution projection is identical across both manifests
  
