# EttleX Slice Registry
#
# This file is the source of truth for all vertical slices implemented in the codebase.
# It is read by the code generator at plan time and updated on completion of each slice.
#
# The `make test-slice` Makefile target derives its test filter from the registered
# tests across all completed slices. Every test listed here must pass under test-slice.
#
# Format:
#   [[slice]]          — one entry per completed slice
#   [[slice.tests]]    — one entry per registered test within the slice
#   [[slice.pre_authorised_failures]]  — tests outside the slice boundary that were
#                                        expected to fail as a consequence of the slice
#
# Status values: "complete" | "in-progress"
#
# This file grows monotonically. Entries are never removed.
# Slices are listed in implementation order.

